apiVersion: apps/v1
kind: Deployment
metadata: 
  name: nginx
  labels: 
    first: app
spec: # BEHAVIOUR OF THE REPLICASET
  replicas: 3
  selector: 
    matchLabels: 
      app: web
  template: 
    metadata: 
      labels:
        app: web
    spec: # BEHAVIOUR OF THE POD
      containers: 
        - name: rahul-container
          image: nginx
          ports: 
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: my-service 
spec:
  selector: 
    app: web
  ports:
  - protocol: TCP
    port: 89 
    targetPort: 80
  type: ClusterIP                        


